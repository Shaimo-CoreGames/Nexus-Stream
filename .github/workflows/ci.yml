name: Nexus-Stream CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # We spin up a real Redis instance in the cloud to test your code!
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn redis sqlalchemy psycopg2-binary
        
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Health Check Run
      run: |
        # 1. Tell Python that the 'app' folder contains our modules
        export PYTHONPATH=$PYTHONPATH:$(pwd)/app
        
        # 2. Try to import from the app folder
        # We use 'from app.main' because of your folder structure
        python -c "from app.main import app as fastapi_app; print('App imported successfully from /app folder!')"